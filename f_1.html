<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            font-size: 250%;
            background-color:red ;
            font-style:italic ;
            border-radius:100 ;
            border-bottom:40px double green ;
           border-left: 40px double rgb(204, 23, 23);
           border-right: 40px double rgb(43, 91, 43);
           box-shadow:40px double rgb(49, 108, 49);


        }
        .p1{
            background-color: rgb(217, 189, 172);
        }
        #p3{
            background-color: rgb(111, 113, 215);
        }


    </style>
</head>

<body>
    <p class="p1">this is a paragraph</p>
    <p class="p2">this is a paragraph</p>
    <p id="p3">this is a paragraph</p>
</body>

</html>
